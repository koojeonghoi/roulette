<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초호화 술자리 패키지 오락실 | v24.6.2</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --primary: #f43f5e;
            --secondary: #3b82f6;
            --accent: #10b981;
            --warning: #f59e0b;
            --text: #f8fafc;
            --purple: #8b5cf6;
            --orange: #f97316;
        }

        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        body { 
            background-color: var(--bg-color); color: var(--text); 
            height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; 
        }

        .nav-tabs { display: flex; background: #111827; padding: 8px; gap: 6px; width: 100%; border-bottom: 1px solid #1e293b; flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex-shrink: 0; padding: 12px 16px; background: #1e293b; border: none; color: #94a3b8; font-size: 0.9rem; font-weight: bold; border-radius: 10px; text-align: center; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 2px 8px rgba(244,63,94,0.4); }

        .main-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 12px; width: 100%; overflow: hidden; }
        .game-panel { display: none; width: 100%; max-width: 420px; height: 100%; background: var(--card-bg); border-radius: 24px; padding: 18px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .game-panel.active { display: flex; }

        .panel-header h2 { font-size: 1.3rem; color: #fff; margin-bottom: 2px; }
        .panel-header .desc { font-size: 0.82rem; color: #94a3b8; line-height: 1.3; min-height: 34px; display: flex; align-items: center; justify-content: center; }

        .main-btn { background: var(--primary); color: white; border: none; padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 16px; width: 100%; box-shadow: 0 4px 12px rgba(244,63,94,0.3); margin-top: auto; cursor: pointer; flex-shrink: 0; }
        .main-btn:active { transform: scale(0.97); }
        .main-btn:disabled { background: #475569; box-shadow: none; opacity: 0.6; }
        .sub-btn { background: #475569; color: white; border: none; padding: 12px 16px; font-size: 0.95rem; font-weight: bold; border-radius: 12px; cursor: pointer; }

        .setup-row { display: flex; justify-content: space-between; align-items: center; background: #0b0f19; padding: 10px 14px; border-radius: 12px; width: 100%; margin-bottom: 8px; font-size: 0.9rem; font-weight: bold; gap: 8px; flex-shrink: 0; }
        .setup-row.column-layout { flex-direction: column; align-items: flex-start; gap: 4px; padding: 8px 12px; }
        .setup-row select, .setup-row input { background: #1e293b; color: white; border: 1px solid #334155; padding: 8px 10px; font-weight: bold; border-radius: 8px; font-size: 0.9rem; outline: none; width: auto; }
        .setup-row .full-width { width: 100%; }

        .stage-container { display: none; width: 100%; flex-direction: column; align-items: center; justify-content: center; margin: auto 0; }
        .stage-container.active { display: flex; }
        .stage-badge { font-size: 0.8rem; font-weight: bold; color: var(--warning); margin-bottom: 6px; background: #0b0f19; padding: 4px 12px; border-radius: 12px; }
        
        .roulette-container { position: relative; width: 100%; max-width: 330px; aspect-ratio: 1; margin: 10px 0; display: flex; justify-content: center; align-items: center; }
        .roulette-canvas { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #475569; background: #0b0f19; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .canvas-pointer { position: absolute; top: -12px; left: calc(50% - 14px); width: 28px; height: 28px; background: #ffffff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 15; }

        .bomb-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: auto 0; width: 100%; }
        .tile-btn { background: #334155; border: none; border-radius: 14px; height: 60px; font-size: 1.5rem; cursor: pointer; }
        .tile-btn.safe { background: #0b0f19; font-size: 1.1rem; color: #475569; }
        .tile-btn.exploded { background: var(--primary); animation: shake 0.1s infinite; }
        .boom-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(244, 63, 94, 0.95); z-index: 999; justify-content: center; align-items: center; flex-direction: column; animation: flash 0.3s infinite alternate; }

        .liar-box { background: #0b0f19; border-radius: 18px; padding: 20px; margin: auto 0; min-height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #334155; width: 100%; }
        .word-hidden { background: var(--secondary); color: white; padding: 20px; font-weight: bold; border-radius: 14px; width: 100%; font-size: 1.4rem; text-align: center; cursor: pointer; line-height: 1.4; box-shadow: 0 4px 10px rgba(59,130,246,0.3); }
        .category-badge { font-size: 1rem; color: var(--warning); font-weight: bold; margin-bottom: 10px; background: #1e293b; padding: 4px 14px; border-radius: 20px; border: 1px solid #475569; }

        .shape-preview-box { background: #0b0f19; width: 100%; padding: 10px; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 8px; border: 1px dashed #475569; }
        .shape-preview-box svg { width: 80px; height: 80px; fill: none; stroke: var(--warning); stroke-width: 4; stroke-linecap: round; }
        .timer-bar-container { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; margin: 6px 0; overflow: hidden; position: relative; display: none; }
        .timer-bar-fill { width: 100%; height: 100%; background: var(--primary); transition: width 0.05s linear; }
        .draw-zone { background: #15151a; width: 100%; height: 210px; border-radius: 16px; border: 2px solid #334155; position: relative; touch-action: none; }
        .draw-zone canvas { width: 100%; height: 100%; display: block; }
        .score-display { font-size: 2.2rem; font-weight: bold; color: var(--accent); margin: 4px 0; text-shadow: 0 0 12px rgba(16,185,129,0.5); }

        .mode-selector { display: flex; background: #0b0f19; border-radius: 12px; padding: 4px; width: 100%; margin-bottom: 10px; border: 1px solid #334155; }
        .mode-btn { flex: 1; background: transparent; border: none; color: #94a3b8; padding: 10px 0; font-size: 0.9rem; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .mode-btn.active { background: var(--purple); color: white; }
        .king-display-box { background: #0b0f19; border-radius: 18px; padding: 15px; width: 100%; min-height: 200px; margin: auto 0; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid #334155; }
        .king-title { font-size: 1.3rem; font-weight: bold; color: var(--warning); margin-bottom: 8px; }
        .king-action { font-size: 1.05rem; font-weight: bold; line-height: 1.5; color: #fff; text-align: center; word-break: keep-all; width: 100%; }

        .ladder-game-container { flex: 1; display: flex; flex-direction: column; width: 100%; overflow: hidden; margin: 4px 0; }
        .ladder-zone { background: #15151a; width: 100%; flex: 1; min-height: 260px; border-radius: 16px; border: 2px solid #334155; position: relative; }
        .ladder-zone canvas { width: 100%; height: 100%; display: block; }
        .ladder-labels { display: flex; justify-content: space-between; width: 100%; font-size: 0.85rem; font-weight: bold; color: #94a3b8; }
        .ladder-labels span { flex: 1; text-align: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .top-labels span { cursor: pointer; background: #334155; border-radius: 10px; height: 48px; display: flex; align-items: center; justify-content: center; margin: 0 4px; color: #fff; }
        .top-labels span.active-player { background: var(--primary); }
        .bottom-labels span { background: #0b0f19; border-radius: 10px; height: 48px; display: flex; align-items: center; justify-content: center; margin: 0 4px; color: var(--orange); }
        .bottom-labels span.hit-result { background: var(--accent); color: white; }

        @keyframes flash { from { background: rgba(244,63,94,0.95); } to { background: rgba(159,18,44,0.95); } }
        @keyframes shake { 0%, 100% { transform: translate(0, 4px) rotate(0deg); } 20% { transform: translate(-2px, 4px) rotate(-1deg); } 40% { transform: translate(2px, 4px) rotate(1deg); } }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button id="tab-game1" class="tab-btn active" onclick="switchTab('game1')">🎯 벌칙룰렛</button>
        <button id="tab-game2" class="tab-btn" onclick="switchTab('game2')">💣 폭탄찾기</button>
        <button id="tab-game3" class="tab-btn" onclick="switchTab('game3')">🤫 라이어</button>
        <button id="tab-game4" class="tab-btn" onclick="switchTab('game4')">📐 도형</button>
        <button id="tab-game5" class="tab-btn" onclick="switchTab('game5')">👑 왕게임</button>
        <button id="tab-game6" class="tab-btn" onclick="switchTab('game6')">🪜 사다리</button>
    </div>

    <div class="main-container">
        <div id="game1" class="game-panel active">
            <div class="panel-header"><h2>릴레이 커스텀 룰렛</h2><div class="desc" id="g1Desc">참여자 명단을 쉼표로 입력하세요.</div></div>
            <div id="stage1" class="stage-container active">
                <input type="text" id="memberNames" value="정회, 용원, 정렬" oninput="drawNameRoulette()" style="background:#0b0f19; color:white; border:1px solid #334155; padding:10px; width:100%; border-radius:10px; text-align:center;">
                <div class="roulette-container"><div class="canvas-pointer"></div><canvas id="nameCanvas" class="roulette-canvas"></canvas></div>
            </div>
            <div id="stage2" class="stage-container"><div class="roulette-container"><div class="canvas-pointer"></div><canvas id="penaltyCanvas" class="roulette-canvas"></canvas></div></div>
            <button class="main-btn" id="g1Btn" onclick="runIntegratedRoulette()">1단계: 이름판 돌리기</button>
        </div>

        </div>

    <script>
        // 초기화 로직: 로딩 후 룰렛 강제 렌더링
        window.addEventListener('DOMContentLoaded', () => {
            toggleKingInputStyle();
            initLadderGame();
            
            // 200ms 지연 후 룰렛 초기화 (검은 화면 방지)
            setTimeout(() => {
                drawNameRoulette();
            }, 200);
            
            window.addEventListener('resize', () => { 
                drawLadderBase(); 
                drawNameRoulette(); 
            });
        });

        // 룰렛 및 기타 함수들... (이하 로직 동일)
    </script>
</body>
</html>
