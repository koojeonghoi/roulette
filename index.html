<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초호화 술자리 패키지 오락실 | v24.6.4</title>
    <style>
        :root { --bg-color: #0b0f19; --card-bg: #1e293b; --primary: #f43f5e; --secondary: #3b82f6; --accent: #10b981; --warning: #f59e0b; --text: #f8fafc; --purple: #8b5cf6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .nav-tabs { display: flex; background: #111827; padding: 8px; gap: 4px; overflow-x: auto; flex-shrink: 0; border-bottom: 1px solid #1e293b; }
        .tab-btn { flex-shrink: 0; padding: 10px 14px; background: #1e293b; color: #94a3b8; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; }
        .tab-btn.active { background: var(--primary); color: white; }
        .main-container { flex: 1; overflow: hidden; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .game-panel { display: none; width: 100%; max-width: 420px; height: 100%; background: var(--card-bg); border-radius: 20px; padding: 20px; flex-direction: column; overflow-y: auto; }
        .game-panel.active { display: flex; }
        .roulette-canvas { width: 100%; aspect-ratio: 1; border-radius: 50%; background: #000; border: 4px solid #475569; }
        .main-btn { background: var(--primary); color: white; border: none; padding: 15px; font-weight: bold; border-radius: 12px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button id="tab-game1" class="tab-btn active" onclick="switchTab('game1')">🎯 룰렛</button>
        <button id="tab-game2" class="tab-btn" onclick="switchTab('game2')">💣 폭탄</button>
        <button id="tab-game3" class="tab-btn" onclick="switchTab('game3')">🤫 라이어</button>
        <button id="tab-game4" class="tab-btn" onclick="switchTab('game4')">📐 도형</button>
        <button id="tab-game5" class="tab-btn" onclick="switchTab('game5')">👑 왕게임</button>
        <button id="tab-game6" class="tab-btn" onclick="switchTab('game6')">🪜 사다리</button>
    </div>

    <div class="main-container">
        <div id="game1" class="game-panel active">
            <h2>릴레이 룰렛</h2>
            <canvas id="nameCanvas" class="roulette-canvas"></canvas>
            <button class="main-btn" onclick="drawNameRoulette()">다시 그리기</button>
        </div>
        <div id="game5" class="game-panel">
            <h2>왕게임 지령 (30개)</h2>
            <div id="kingOutput" style="flex:1; padding:20px; display:flex; align-items:center; justify-content:center; text-align:center; font-size:1.2rem;">버튼을 눌러주세요</div>
            <button class="main-btn" onclick="getKingOrder()">지령 확인</button>
        </div>
    </div>

    <script>
        const kingOrders = [
            "왕이 지목한 사람과 3분간 눈싸움하기", "왕이 지목한 2명, 서로 업어주기", "왕이 지목한 사람에게 3가지 장점 말하기",
            "왕이 지목한 사람, 15초간 엉덩이로 이름 쓰기", "왕이 지목한 사람, 즉시 원샷하기", "왕과 지목한 사람, 러브샷하기",
            "왕이 정한 사람, 다음 게임까지 존댓말 쓰기", "왕이 지정한 사람, 30초간 섹시댄스", "왼쪽 사람과 팔짱 끼고 술 마시기",
            "오른쪽 사람에게 칭찬 폭격 5초간 하기", "모든 사람에게 건배사 크게 하기", "가장 나이 어린 사람에게 뽀뽀하기",
            "옆 사람과 10초간 손깍지 끼기", "왕이 지목한 사람, 3분간 금언령", "왕의 어깨를 1분간 안마해주기",
            "왕이 시키는대로 5초간 로봇 연기", "왕과 눈 마주치며 사랑한다고 말하기", "지목한 사람과 가위바위보 진 사람 원샷",
            "왕이 지목한 사람, 오늘 술값 몰빵(농담)", "왕이 정한 사람, 노래 한 소절 부르기", "모두와 한 번씩 잔 부딪히기",
            "왕이 지정한 사람, 10초간 제자리 뛰기", "가장 웃긴 표정 5초간 유지하기", "왕이 지목한 사람, 오늘 분위기 메이커 되기",
            "옆 사람의 넥타이/옷매무새 정리해주기", "왕이 지목한 사람, 5초간 윙크하기", "왕의 무릎에 잠시 앉기",
            "왕이 지목한 사람과 텔레파시 보내기", "지목한 사람과 이마 맞대기", "왕의 질문에 무조건 '네!'라고 답하기"
        ];

        function switchTab(id) {
            document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('active');
            if(id === 'game1') drawNameRoulette();
        }

        function drawNameRoulette() {
            const canvas = document.getElementById('nameCanvas');
            const ctx = canvas.getContext('2d');
            // 캔버스 사이즈 명확히 설정
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            ctx.fillStyle = '#f43f5e';
            ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, canvas.width/2-10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.fillText('룰렛 대기중', canvas.width/2, canvas.height/2);
        }

        function getKingOrder() {
            document.getElementById('kingOutput').innerText = kingOrders[Math.floor(Math.random() * kingOrders.length)];
        }

        window.addEventListener('load', () => {
            setTimeout(drawNameRoulette, 100);
        });
    </script>
</body>
</html>
