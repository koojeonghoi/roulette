<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>온라인 이름 지정형 2단계 룰렛 추첨기 | 술자리 팩 v11.2</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --primary: #f43f5e;
            --secondary: #3b82f6;
            --accent: #10b981;
            --warning: #f59e0b;
            --text: #f8fafc;
        }

        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        body { 
            background-color: var(--bg-color); color: var(--text); 
            height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* 내비게이션 바 */
        .nav-tabs { display: flex; background: #111827; padding: 8px; gap: 6px; width: 100%; border-bottom: 1px solid #1e293b; flex-shrink: 0; }
        .tab-btn { flex: 1; background: #1e293b; border: none; color: #94a3b8; padding: 14px 0; font-size: 0.95rem; font-weight: bold; border-radius: 10px; text-align: center; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 2px 8px rgba(244,63,94,0.4); }

        .main-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 12px; width: 100%; overflow: hidden; }
        .game-panel { display: none; width: 100%; max-width: 420px; height: 100%; background: var(--card-bg); border-radius: 24px; padding: 18px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .game-panel.active { display: flex; }

        .panel-header h2 { font-size: 1.35rem; color: #fff; margin-bottom: 2px; }
        .panel-header .desc { font-size: 0.85rem; color: #94a3b8; line-height: 1.3; min-height: 34px; display: flex; align-items: center; justify-content: center; }

        .main-btn { background: var(--primary); color: white; border: none; padding: 16px; font-size: 1.15rem; font-weight: bold; border-radius: 16px; width: 100%; box-shadow: 0 4px 12px rgba(244,63,94,0.3); margin-top: auto; }
        .main-btn:active { transform: scale(0.97); }
        .main-btn:disabled { background: #475569; box-shadow: none; opacity: 0.6; }
        .sub-btn { background: #475569; color: white; border: none; padding: 10px 16px; font-size: 0.9rem; font-weight: bold; border-radius: 12px; }

        /* --- 🎯 게임 1: 고성능 2단계 순차 캔버스 룰렛 시스템 --- */
        .stage-container { display: none; width: 100%; flex-direction: column; align-items: center; justify-content: center; margin: auto 0; }
        .stage-container.active { display: flex; }
        .stage-badge { font-size: 0.8rem; font-weight: bold; color: var(--warning); margin-bottom: 12px; background: #0b0f19; padding: 4px 12px; border-radius: 12px; }

        /* 이름 입력 컴포넌트 */
        .name-input-box { width: 100%; margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; text-align: left; }
        .name-input-box label { font-size: 0.85rem; color: #94a3b8; font-weight: bold; padding-left: 4px; }
        .name-input-box input { background: #0b0f19; border: 1px solid #334155; border-radius: 10px; padding: 10px 14px; color: #fff; font-size: 0.9rem; outline: none; }

        /* 대형 그래픽 보드 레이아웃 */
        .roulette-container { position: relative; width: 260px; height: 260px; margin: 5px 0; display: flex; justify-content: center; align-items: center; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #475569; background: #0b0f19; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        
        /* 절대좌표 상단 타겟 포인터 */
        .canvas-pointer { position: absolute; top: -12px; left: calc(50% - 12px); width: 24px; height: 26px; background: #ffffff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 15; filter: drop-shadow(0 3px 4px rgba(0,0,0,0.4)); }

        /* --- 게임 2: 복불복 폭탄 찾기 --- */
        .bomb-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: auto 0; width: 100%; }
        .tile-btn { background: #334155; border: none; border-radius: 14px; height: 65px; font-size: 1.6rem; box-shadow: 0 4px 0 #1e293b; }
        .tile-btn.safe { background: #0b0f19; font-size: 1.1rem; color: #475569; box-shadow: none; transform: translateY(4px); }
        .tile-btn.exploded { background: var(--primary); animation: shake 0.1s infinite; box-shadow: none; transform: translateY(4px); }

        /* --- 게임 3: 라이어 게임 --- */
        .liar-box { background: #0b0f19; border-radius: 18px; padding: 20px; margin: auto 0; min-height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #334155; width: 100%; }
        .word-hidden { background: var(--secondary); color: white; padding: 16px 20px; font-weight: bold; border-radius: 14px; width: 90%; font-size: 1rem; text-align: center; }

        .boom-flash { animation: flashBg 0.3s ease-out; }
        @keyframes flashBg { 0%, 100% { background-color: var(--bg-color); } 50% { background-color: #6b071a; } }
    </style>
</head>
<body id="bodyContext">

    <!-- 상단 탭 인프라 -->
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab(this, 'game1')">🎯 이름 벌칙 룰렛</button>
        <button class="tab-btn" onclick="switchTab(this, 'game2')">💣 폭탄 찾기</button>
        <button class="tab-btn" onclick="switchTab(this, 'game3')">🤫 라이어게임</button>
    </div>

    <div class="main-container">

        <!-- 게임 1: 가변 캔버스 렌더러 탑재 2단계 룰렛 패널 -->
        <div id="game1" class="game-panel active">
            <div class="panel-header">
                <h2>릴레이 커스텀 룰렛</h2>
                <div class="desc" id="g1Desc">참여자 이름을 쉼표로 구분해 입력해 주세요!</div>
            </div>
            
            <!-- [1단계 스테이지]: 실시간 캔버스 생성 및 드로잉 존 -->
            <div id="stage1" class="stage-container active">
                <div class="stage-badge">STEP 1. 벌칙 대상자 추첨</div>
                <div class="name-input-box">
                    <label for="memberNames">참여자 명단</label>
                    <input type="text" id="memberNames" value="이든, 하윤, 서준, 지우, 민재" oninput="drawNameRoulette()">
                </div>
                <div class="roulette-container">
                    <div class="canvas-pointer"></div>
                    <canvas id="nameCanvas" width="500" height="500"></canvas>
                </div>
            </div>

            <!-- [2단계 스테이지]: 고정 벌칙 캔버스 렌더 존 -->
            <div id="stage2" class="stage-container">
                <div class="stage-badge">STEP 2. 걸린 사람 벌칙 매칭</div>
                <div class="roulette-container">
                    <div class="canvas-pointer"></div>
                    <canvas id="penaltyCanvas" width="500" height="500"></canvas>
                </div>
            </div>

            <!-- 메인 가변 제어 장치 -->
            <button class="main-btn" id="g1Btn" onclick="runIntegratedRoulette()">1단계: 이름판 돌리기</button>
        </div>

        <!-- 게임 2: 지뢰 복불복 -->
        <div id="game2" class="game-panel">
            <div class="panel-header">
                <h2>복불복 폭탄 찾기</h2>
                <div class="desc" id="g2Desc">16칸 상자를 선택하세요. 지뢰 포착 시 원샷!</div>
            </div>
            <div class="bomb-grid" id="bombGrid"></div>
            <button class="sub-btn" onclick="initBombGame()">새 게임 시작</button>
        </div>

        <!-- 게임 3: 라이어 게임 -->
        <div id="game4" class="game-panel">
            <div class="panel-header">
                <h2>술자리 라이어 게임</h2>
                <div class="desc" id="g3Desc">단어를 순서대로 확인한 뒤 라이어를 찾아내세요.</div>
            </div>
            <div class="setup-row" style="display:flex; justify-content:space-between; background:#334155; padding:10px; border-radius:12px; width:100%; margin-bottom: 10px;">
                <span>참여 인원:</span>
                <input type="number" id="liarTotalInput" value="4" min="3" style="background:#1e293b; color:white; border:none; width:60px; text-align:center; font-weight:bold; border-radius:6px;">
            </div>
            <div class="liar-box">
                <div id="liarTurnInfo" style="font-size:1.05rem; margin-bottom:10px; font-weight:bold; color:var(--warning);">준비 완료</div>
                <div class="word-hidden" id="liarSecretBox" onclick="toggleLiarWord()">터치하여 제시어 확인</div>
            </div>
            <button class="main-btn" id="g3Btn" onclick="startLiarSetup()">라이어 게임 시작</button>
        </div>

    </div>

    <script>
        // 글로벌 상태 관리 및 상수 배열 설정
        let currentStep = 1;
        let isG1Running = false;
        let currentSelectedTarget = "";
        
        // 🛠️ 밸런스 패치: 중복되는 벌칙을 명확하고 재미있는 지목형 벌칙으로 전면 수정
        const penalties = ["한 잔 마시기", "양옆 마시기", "나만 살기", "안주 금지", "술 2잔 마시기", "마시고 한명 지목"];
        const colorPalette = ["#f43f5e", "#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899", "#14b8a6", "#6366f1"];

        window.onload = function() {
            drawNameRoulette();
            drawPenaltyRoulette(0);
        };

        // 탭 전환 핸들러
        function switchTab(btnEl, tabId) {
            document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            let target = (tabId === 'game3') ? 'game4' : tabId;
            document.getElementById(target).classList.add('active');
            btnEl.classList.add('active');
            
            if(tabId === 'game2') initBombGame();
            if(tabId === 'game3') resetLiarUI();
            if(tabId === 'game1') resetGame1Logic();
        }

        // 진동 모듈 인터페이스
        function triggerVibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }

        // 파싱 모듈
        function parseNames() {
            return document.getElementById('memberNames').value.split(',').map(n => n.trim()).filter(n => n.length > 0);
        }

        // ===================================================
        // 🎨 고성능 HTML5 Canvas 가변 물리 드로잉 엔진
        // ===================================================
        function drawNameRoulette(currentAngle = 0) {
            const canvas = document.getElementById('nameCanvas');
            const ctx = canvas.getContext('2d');
            const names = parseNames();
            const len = names.length;
            
            ctx.clearRect(0, 0, 500, 500);
            if(len === 0) return;

            const arc = (2 * Math.PI) / len;

            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(currentAngle);

            for (let i = 0; i < len; i++) {
                ctx.beginPath();
                ctx.fillStyle = colorPalette[i % colorPalette.length];
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, 240, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 24px sans-serif";
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.rotate(i * arc + arc / 2);
                ctx.fillText(names[i], 210, 0);
                ctx.restore();
            }
            ctx.restore();
        }

        function drawPenaltyRoulette(currentAngle = 0) {
            const canvas = document.getElementById('penaltyCanvas');
            const ctx = canvas.getContext('2d');
            const len = penalties.length;
            const arc = (2 * Math.PI) / len;

            ctx.clearRect(0, 0, 500, 500);
            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(currentAngle);

            for (let i = 0; i < len; i++) {
                ctx.beginPath();
                ctx.fillStyle = colorPalette[(i + 2) % colorPalette.length];
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, 240, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 22px sans-serif";
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.rotate(i * arc + arc / 2);
                ctx.fillText(penalties[i], 210, 0);
                ctx.restore();
            }
            ctx.restore();
        }

        function resetGame1Logic() {
            currentStep = 1; isG1Running = false; currentSelectedTarget = "";
            document.getElementById('stage1').classList.add('active');
            document.getElementById('stage2').classList.remove('active');
            document.getElementById('g1Desc').textContent = "참여자 이름을 적고 원판을 돌리세요!";
            drawNameRoulette(0);
            
            const btn = document.getElementById('g1Btn');
            btn.textContent = "1단계: 이름판 돌리기";
            btn.style.background = "var(--primary)";
            btn.disabled = false;
        }

        // ===================================================
        // 🔄 물리 감속 스핀 프레임 인터폴레이션 애니메이션 시스템
        // ===================================================
        function runIntegratedRoulette() {
            if (isG1Running) return;
            const names = parseNames();
            if (names.length === 0) { alert("참여자 이름을 작성해 주세요!"); return; }

            isG1Running = true;
            const btn = document.getElementById('g1Btn');
            btn.disabled = true;

            let startTime = null;
            const duration = 3000;
            const startRot = 0;
            const targetRot = (Math.random() * 2 * Math.PI) + (2 * Math.PI * 6);

            if (currentStep === 1) {
                document.getElementById('g1Desc').textContent = "누구 이름에서 멈출까?! 두근두근... 🌀";
                
                function animateName(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const elapsed = timestamp - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    const currentAngle = startRot + (targetRot * easeOut);
                    
                    drawNameRoulette(currentAngle);

                    if (progress < 1) {
                        requestAnimationFrame(animateName);
                    } else {
                        const finalAngle = currentAngle % (2 * Math.PI);
                        const len = names.length;
                        const arc = (2 * Math.PI) / len;
                        
                        let targetIdx = Math.floor(((1.5 * Math.PI) - finalAngle + 2 * Math.PI) % (2 * Math.PI) / arc);
                        if (targetIdx < 0 || targetIdx >= len) targetIdx = 0;
                        
                        currentSelectedTarget = names[targetIdx];
                        triggerVibrate([200, 100]);
                        document.getElementById('g1Desc').innerHTML = `🎯 당첨자: 🎉 <strong>[ ${currentSelectedTarget} ]</strong>`;

                        setTimeout(() => {
                            document.getElementById('stage1').classList.remove('active');
                            document.getElementById('stage2').classList.add('active');
                            document.getElementById('g1Desc').innerHTML = `👤 <strong>${currentSelectedTarget}</strong> 님이 수행할 벌칙을 결정합니다.`;
                            drawPenaltyRoulette(0);

                            btn.textContent = "2단계: 벌칙판 돌리기";
                            btn.style.background = "var(--secondary)";
                            btn.disabled = false;
                            currentStep = 2;
                            isG1Running = false;
                        }, 1500);
                    }
                }
                requestAnimationFrame(animateName);

            } else if (currentStep === 2) {
                document.getElementById('g1Desc').textContent = "과연 어떤 벌칙이 매칭될 것인가...?! 😨";

                function animatePenalty(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const elapsed = timestamp - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    const currentAngle = startRot + (targetRot * easeOut);
                    
                    drawPenaltyRoulette(currentAngle);

                    if (progress < 1) {
                        requestAnimationFrame(animatePenalty);
                    } else {
                        const finalAngle = currentAngle % (2 * Math.PI);
                        const len = penalties.length;
                        const arc = (2 * Math.PI) / len;
                        
                        let penaltyIdx = Math.floor(((1.5 * Math.PI) - finalAngle + 2 * Math.PI) % (2 * Math.PI) / arc);
                        const resultDuty = penalties[penaltyIdx];

                        document.getElementById('g1Desc').innerHTML = `🍺 <strong>${currentSelectedTarget}</strong> 👉 💥 <strong>[ ${resultDuty} ]</strong> 당첨!!!`;
                        document.getElementById('bodyContext').classList.add('boom-flash');
                        triggerVibrate([400, 150, 400]);
                        setTimeout(() => document.getElementById('bodyContext').classList.remove('boom-flash'), 500);

                        btn.textContent = "다음 게임 준비";
                        btn.style.background = "var(--accent)";
                        btn.disabled = false;
                        currentStep = 3;
                        isG1Running = false;
                    }
                }
                requestAnimationFrame(animatePenalty);

            } else if (currentStep === 3) {
                resetGame1Logic();
            }
        }

        // ==========================================
        // GAME 2: 💣 복불복 폭탄 찾기 Engine
        // ==========================================
        let bombLocations = []; let isGameOver = false;
        function initBombGame() {
            const grid = document.getElementById('bombGrid');
            grid.innerHTML = ''; bombLocations = [Math.floor(Math.random() * 16)]; isGameOver = false;
            document.getElementById('g2Desc').textContent = "16칸 상자를 선택하세요. 지뢰 포착 시 원샷!";
            for (let i = 0; i < 16; i++) {
                const btn = document.createElement('button'); btn.className = 'tile-btn'; btn.textContent = '❓';
                btn.onclick = () => {
                    if (isGameOver || btn.classList.contains('safe')) return;
                    if (bombLocations.includes(i)) {
                        isGameOver = true; btn.className = 'tile-btn exploded'; btn.textContent = '💥';
                        document.getElementById('g2Desc').textContent = "🚨 콰아앙!!! 폭탄 폭발!";
                        triggerVibrate([500, 200, 500]);
                    } else {
                        btn.className = 'tile-btn safe'; btn.textContent = '🟢'; triggerVibrate(40);
                    }
                };
                grid.appendChild(btn);
            }
        }

        // ==========================================
        // GAME 3: 🤫 라이어 게임 Engine
        // ==========================================
        const extendedWords = ["치킨", "삼겹살", "소주", "노래방", "스마트폰", "맥주", "영화관", "피자", "커피", "마라탕", "편의점", "노트북", "지하철", "택시"];
        let currentSecretWord = "", liarIndex = 0, currentCheckUser = 1, totalLiarUsers = 4, isWordRevealed = false;
        
        function resetLiarUI() {
            document.getElementById('liarTurnInfo').textContent = "대기 중";
            const box = document.getElementById('liarSecretBox'); box.className = "word-hidden"; box.textContent = "터치하여 제시어 확인";
            document.getElementById('g3Btn').disabled = false; isWordRevealed = false;
        }
        function startLiarSetup() {
            totalLiarUsers = parseInt(document.getElementById('liarTotalInput').value) || 4;
            currentSecretWord = extendedWords[Math.floor(Math.random() * extendedWords.length)];
            liarIndex = Math.floor(Math.random() * totalLiarUsers) + 1; currentCheckUser = 1;
            document.getElementById('g3Btn').disabled = true; setupNextUserTurn();
        }
        function setupNextUserTurn() {
            isWordRevealed = false; const box = document.getElementById('liarSecretBox'); box.className = "word-hidden"; box.textContent = "터치하여 제시어 확인";
            if (currentCheckUser <= totalLiarUsers) {
                document.getElementById('liarTurnInfo').textContent = `👤 [ 플레이어 ${currentCheckUser} ] 차례`;
            } else {
                document.getElementById('liarTurnInfo').textContent = "📢 확인 완료!";
                box.textContent = "🔍 범인을 색출하세요";
            }
        }
        function toggleLiarWord() {
            if (currentCheckUser > totalLiarUsers || isWordRevealed) return;
            const box = document.getElementById('liarSecretBox'); box.className = "word-shown";
            if (currentCheckUser === liarIndex) { box.textContent = "🤫 당신은 [ 라이어 ]"; box.style.color = "var(--primary)"; }
            else { box.textContent = `🎯 제시어: ${currentSecretWord}`; box.style.color = "var(--accent)"; }
            isWordRevealed = true; triggerVibrate(60);
            setTimeout(() => { currentCheckUser++; setupNextUserTurn(); }, 1800);
        }
    </script>
</body>
</html>
